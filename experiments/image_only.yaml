# Modal ablation variant — image-only branch (text encoder and history disabled).
# Compared against baseline.yaml (full fusion model).
name: image_only
seed: 42

# History is meaningless for ImageOnly (text inputs ignored), so FR and TF agree.
eval_mode: fr

data:
  manifest_path: processed/frame_labels/_manifest.json
  frames_root: data/frames
  labels_root: processed/frame_labels
  window_size: 64
  batch_size: 8
  num_windows_per_video: 4
  num_workers: 4

model:
  type: image_only
  hidden_dim: 512
  num_classes: 8
  image_pretrained: true
  classifier_dropout: 0.1

training:
  epochs: 20
  history_length: 0       # unused
  max_text_len: 16        # tokens generated by trainer but ignored by model
  use_amp: true
  grad_clip: 1.0
  optimizer:
    encoder_lr: 1.0e-5
    head_lr: 1.0e-4
    weight_decay: 1.0e-4
  scheduled_sampling:
    p_start: 0.0
    p_end: 0.0            # no SS — image-only doesn't use history
    ramp_epochs: 0

checkpoint:
  dir: checkpoints/image_only
  save_every: 1
